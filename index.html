<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Letroso Cross</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:linear-gradient(#1a0033,#660099);min-height:100vh;color:#fff;display:flex;flex-direction:column}header{padding:12px;display:flex;justify-content:space-between;background:rgba(0,0,0,.2)}main{flex:1;padding:16px;max-width:500px;margin:0 auto;width:100%}.question{background:linear-gradient(135deg,#ff00aa,#aa00ff);padding:16px;border-radius:20px;text-align:center;font-weight:900;font-size:20px;margin-bottom:14px}.slots{display:flex;flex-direction:column;gap:8px;align-items:center;margin-bottom:12px;min-height:50px}.slot-row{display:flex;gap:5px}.letter-slot{width:38px;height:38px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900}.letter-slot.filled{background:#ff00aa;border-color:#fff}.wheel-container{position:relative;width:280px;height:280px;margin:10px auto}.wheel-bg{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.1),transparent);border:1px solid rgba(255,255,255,.2)}.letter-btn{position:absolute;width:62px;height:62px;border-radius:50%;background:#fff;color:#660099;font-weight:900;font-size:24px;border:none;box-shadow:0 4px 0 #ccc;display:flex;align-items:center;justify-content:center;touch-action:none}.letter-btn.active{background:#ff00aa;color:#fff;transform:scale(.92)}.current-word{height:40px;display:flex;justify-content:center;gap:3px;margin-bottom:10px}.current-letter{width:32px;height:32px;background:#fff;color:#660099;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900}.controls{display:flex;gap:10px;justify-content:center}.btn{padding:11px 18px;border:none;border-radius:12px;font-weight:800;color:#fff}.btn-hint{background:#ffaa00}.btn-shuffle{background:#00aaff}.found-words{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px}.found-word{background:rgba(0,255,136,.2);padding:3px 8px;border-radius:10px;font-size:12px}.level-complete{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center}.level-complete.show{display:flex}.complete-box{background:linear-gradient(135deg,#ff00aa,#aa00ff);padding:28px;border-radius:24px;text-align:center;width:85%;max-width:300px}</style></head><body><header><div>Nível <span id="lv">1</span></div><div>🪙 <span id="cn">50</span></div></header><main><div class="question">Você consegue resolver todos eles?</div><div class="slots" id="slots"></div><div class="current-word" id="cur"></div><div class="wheel-container"><div class="wheel-bg"></div><div id="wheel"></div></div><div class="controls"><button class="btn btn-hint" id="hint">💡 Dica (20)</button><button class="btn btn-shuffle" id="shuf">🔀 Embaralhar</button></div><div class="found-words" id="found"></div></main><div class="level-complete" id="done"><div class="complete-box"><h2>🎉 Perfeito!</h2><p id="txt"></p><button id="next" style="width:100%;padding:14px;background:#fff;color:#aa00ff;font-weight:900;border:none;border-radius:12px;margin-top:12px">PRÓXIMO</button></div></div><script>const L=[{l:"SOL",w:["SOL","LOS","OS"]},{l:"LOBO",w:["LOBO","BOLO","SOLO","BOLA","SOL"]},{l:"CASA",w:["CASA","ASA","SACA"]},{l:"AMOR",w:["AMOR","RAMO","ROMA","MAR"]},{l:"FESTA",w:["FESTA","SETA","TESTA"]},{l:"TRILHA",w:["TRILHA","LIRA","RITA","TIRA"]},{l:"LIVRO",w:["LIVRO","VIRO","RIO"]},{l:"PONTO",w:["PONTO","NOTA","PATO"]},{l:"MAGIA",w:["MAGIA","AMIGA","GAMA"]},{l:"SONHO",w:["SONHO","SONO"]},{l:"VENTO",w:["VENTO","NOVO","VETO"]},{l:"PRAIA",w:["PRAIA","PARA","PIRA"]},{l:"FLORES",w:["FLORES","SOL"]},{l:"MUNDO",w:["MUNDO","MUDO"]},{l:"TEMPO",w:["TEMPO","POTE"]},{l:"LUZES",w:["LUZES","LUZ"]},{l:"CAMPO",w:["CAMPO","POMAR"]},{l:"RISOS",w:["RISOS","RISO"]},{l:"PORTA",w:["PORTA","PRATO"]},{l:"ESTRELA",w:["ESTRELA","LESTE"]}];const E=["BRASIL","FUTURO","AMIGO","FELIZ","CIDADE","NATUREZA"];let lv=+localStorage.lv||1,cn=+localStorage.cn||50,found=[],letters=[],path=[],drag=false;const $=i=>document.getElementById(i);function sv(){localStorage.lv=lv;localStorage.cn=cn}function get(){return lv<=20?L[lv-1]:{l:E[(lv-21)%E.length],w:[E[(lv-21)%E.length].slice(0,4),E[(lv-21)%E.length].slice(0,3)]}}function init(){const d=get();letters=d.l.split('').sort(()=>Math.random()-0.5);$('lv').textContent=lv;$('cn').textContent=cn;found=[];$('found').innerHTML='';$('cur').innerHTML='';$('done').classList.remove('show');const s=$('slots');s.innerHTML='';const r=document.createElement('div');r.className='slot-row';d.w.forEach(w=>{for(let i=0;i<w.length;i++){const e=document.createElement('div');e.className='letter-slot';e.dataset.w=w;e.dataset.p=i;r.appendChild(e)}const sp=document.createElement('div');sp.style.width='8px';r.appendChild(sp)});s.appendChild(r);const wh=$('wheel');wh.innerHTML='';const st=2*Math.PI/letters.length;letters.forEach((c,i)=>{const b=document.createElement('button');b.className='letter-btn';b.textContent=c;const a=i*st-Math.PI/2;b.style.left=140+95*Math.cos(a)-31+'px';b.style.top=140+95*Math.sin(a)-31+'px';wh.appendChild(b)});bind();sv()}function bind(){const w=$('wheel');w.onpointerdown=e=>{const b=e.target.closest('.letter-btn');if(!b)return;drag=true;path=[];add(b);e.preventDefault()};window.onpointermove=e=>{if(!drag)return;const el=document.elementFromPoint(e.clientX,e.clientY);const b=el&&el.closest('.letter-btn');if(b&&!path.includes(b))add(b)};window.onpointerup=()=>{if(!drag)return;drag=false;check();path.forEach(b=>b.classList.remove('active'));path=[];$('cur').innerHTML=''}}function add(b){path.push(b);b.classList.add('active');$('cur').innerHTML=path.map(x=>`<div class="current-letter">${x.textContent}</div>`).join('')}function check(){const w=path.map(b=>b.textContent).join('').toUpperCase(),d=get();if(d.w.includes(w)&&!found.includes(w)){found.push(w);document.querySelectorAll(`[data-w="${w}"]`).forEach((s,i)=>{s.textContent=w[i];s.classList.add('filled')});const t=document.createElement('div');t.className='found-word';t.textContent=w;$('found').appendChild(t);cn+=5;$('cn').textContent=cn;if(navigator.vibrate)navigator.vibrate(20);if(found.length>=d.w.length){setTimeout(()=>{cn+=20;$('txt').textContent=`Nível ${lv} completo! +20 moedas`;$('done').classList.add('show');sv()},400)}}} $('next').onclick=()=>{lv++;init()};$('hint').onclick=()=>{if(cn<20)return alert('Sem moedas');const d=get(),r=d.w.find(x=>!found.includes(x));if(r){cn-=20;$('cn').textContent=cn;const s=document.querySelector(`[data-w="${r}"][data-p="0"]`);if(s){s.textContent=r[0];s.classList.add('filled')}sv()}};$('shuf').onclick=()=>init();init();</script></body></html>
