<style>
* { font-family: 'Nunito', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
body { overscroll-behavior: none; touch-action: pan-y; }
.slot { width: 48px; height: 48px; background: linear-gradient(180deg, #9B5CFF 0%, #7A3FF0 100%); border-radius: 14px; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.22), 0 6px 14px rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:1.35rem; color:white; text-transform:uppercase; transition: all .18s; }
@media (min-width:400px){ .slot{ width:54px; height:54px; font-size:1.48rem;} }
.slot.empty{ color:transparent; background: linear-gradient(180deg, #8A52ED 0%, #6D32DD 100%); }
.slot.filled{ animation:pop .32s cubic-bezier(.2,1.6,.4,1); }
@keyframes pop{0%{transform:scale(.75)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
.word-row{ display:flex; gap:8px; justify-content:center; }

.center-btn{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:78px; height:78px; background:#0A8F85; border-radius:50%; color:white; font-size:2.1rem; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 24px rgba(0,0,0,0.28), inset 0 -5px 0 rgba(0,0,0,0.22); }
#wheel{ box-shadow: 0 -12px 0 #E9ECEF inset, 0 28px 55px rgba(0,0,0,0.32); }
.shake{ animation:shake .42s; }
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
</style>

<body class="bg-[#009385] bg-gradient-to-b from-[#006D63] via-[#008578] to-[#00A99D] min-h-screen flex flex-col select-none">
<div class="w-full max-w-[420px] mx-auto flex flex-col min-h-screen">
  <header class="px-4 pt-5">
    <div class="flex items-center justify-between bg-white/15 backdrop-blur-xl rounded-[24px] px-4 py-3.5 text-white shadow-xl ring-1 ring-white/20">
      <div class="flex items-center gap-2 font-black text-[17px]">
        <div class="w-8 h-8 rounded-full bg-gradient-to-b from-yellow-300 to-amber-500 flex items-center justify-center shadow-inner ring-2 ring-yellow-200/60 text-amber-900">🪙</div>
        <span id="coinCount">728</span>
      </div>
      <div class="font-black text-[19px] tracking-wide" id="levelLabel">Nível 6</div>
      <button class="w-8 h-8 grid place-items-center text-2xl opacity-80">⋮</button>
    </div>
    <p class="text-center text-white/95 mt-3.5 font-bold text-[15px]">Você consegue resolver todos eles?</p>
  </header>

  <main class="flex-1 flex flex-col items-center px-4">
    <div id="board" class="w-full mt-8 mb-2 min-h-[240px] flex flex-col items-center justify-center gap-3"><div class="word-row" data-word="PORTA" style="margin-left: 0px;"><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div></div><div class="word-row" data-word="PARTO" style="margin-left: 0px;"><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div></div><div class="word-row" data-word="PRATO" style="margin-left: 0px;"><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div></div><div class="word-row" data-word="TROPA" style="margin-left: 0px;"><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div></div><div class="word-row" data-word="PATO" style="margin-left: 28px;"><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div></div><div class="word-row" data-word="RATO" style="margin-left: 28px;"><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div></div><div class="word-row" data-word="TOPA" style="margin-left: 28px;"><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div><div class="slot empty"></div></div></div>
    <div class="h-[56px] flex items-center justify-center">
      <div id="currentWord" class="px-7 h-[46px] rounded-full bg-white/20 backdrop-blur-xl text-white font-black text-[26px] tracking-[0.18em] flex items-center opacity-0 scale-90 transition-all duration-200 shadow-lg ring-1 ring-white/20"></div>
    </div>
  </main>

  <div class="relative pb-[max(12px,env(safe-area-inset-bottom))]">
    <div class="flex items-center justify-between px-8 mb-4">
      <button id="hintBtn" class="bg-white/18 backdrop-blur-xl text-white px-4 py-2.5 rounded-full font-extrabold text-[14px] flex items-center gap-1.5 active:scale-95 transition shadow-lg ring-1 ring-white/25">💡 DICA <span class="ml-0.5 bg-amber-400 text-amber-950 text-[11px] px-1.5 py-0.5 rounded-md font-black">20</span></button>
      <button id="extraShuffle" class="w-11 h-11 grid place-items-center bg-white/18 backdrop-blur-xl text-white rounded-full text-[22px] active:scale-95 transition shadow-lg ring-1 ring-white/25">⟳</button>
    </div>
    <div class="relative mx-auto select-none" style="width:324px;height:324px" id="wheelWrap">
      <div id="wheel" class="absolute inset-0 bg-white rounded-full"><button class="letter-btn" data-i="0" style="left: 162px; top: 50px;">P</button><button class="letter-btn" data-i="1" style="left: 268.518px; top: 127.39px;">A</button><button class="letter-btn" data-i="2" style="left: 227.832px; top: 252.61px;">R</button><button class="letter-btn" data-i="3" style="left: 96.1681px; top: 252.61px;">T</button><button class="letter-btn" data-i="4" style="left: 55.4817px; top: 127.39px;">O</button></div>
      <svg id="trace" class="absolute inset-0 pointer-events-none z-10" width="324" height="324"></svg>
      <button id="shuffle" class="center-btn z-20 active:scale-95 transition">⟳</button>
    </div>
  </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50 p-6">
  <div class="bg-white rounded-[34px] p-8 w-full max-w-[330px] text-center shadow-2xl">
    <div class="text-6xl mb-2">🎉</div>
    <h2 class="text-[30px] font-black text-teal-700 leading-tight">Nível Completo!</h2>
    <p class="text-slate-500 mt-1.5 font-bold">Você ganhou <span class="text-amber-600 font-black">+30</span> moedas</p>
    <button id="nextBtn" class="mt-6 w-full bg-gradient-to-b from-teal-500 to-teal-700 text-white font-black py-4 rounded-2xl text-[18px] shadow-lg shadow-teal-700/30 active:scale-[0.98] transition">PRÓXIMO</button>
  </div>
</div>

<script>
const LEVELS = [
  {id:1, letters:['S','O','L'], words:['SOL','OS','LO','SO']},
  {id:2, letters:['L','O','B','O'], words:['LOBO','BOLO']},
  {id:3, letters:['B','O','L','A'], words:['BOLA','ALO','BOA','LOA','OLA','OBA']},
  {id:4, letters:['C','A','S','A'], words:['CASA','ASA','SACA','AS']},
  {id:5, letters:['A','M','O','R'], words:['AMOR','ROMA','MORA','RAMO','AMO','MAR']},
  {id:6, letters:['P','A','R','T','O'], words:['PORTA','PARTO','PRATO','TROPA','PATO','RATO','TOPA']},
  {id:7, letters:['F','E','S','T','A'], words:['FESTA','FASE','SETA','TESTA','ESTA','FETA']},
  {id:8, letters:['T','R','I','L','H','A'], words:['TRILHA','TIRA','RITA','LIRA','ILHA','TALHA']},
  {id:9, letters:['L','I','V','R','O'], words:['LIVRO','VIR','RIO','VIRO','ROLI']},
  {id:10, letters:['P','O','N','T','O'], words:['PONTO','TONTO','NOTO','POTO','TOPO']},
  {id:11, letters:['M','A','G','I','A'], words:['MAGIA','GAMA','AMIGA','MIGA','AMA']},
  {id:12, letters:['S','O','N','H','O'], words:['SONHO','SONO','HONO','NOS']},
  {id:13, letters:['V','E','N','T','O'], words:['VENTO','VETO','NETO','NOVE','TON']},
  {id:14, letters:['P','R','A','I','A'], words:['PRAIA','ARIA','PIRA','RAIA','PAI']},
  {id:15, letters:['F','L','O','R','E','S'], words:['FLORES','FLOR','SORE','ROES','SER']},
  {id:16, letters:['M','U','N','D','O'], words:['MUNDO','MUDO','UNDO','DOM']},
  {id:17, letters:['T','E','M','P','O'], words:['TEMPO','METO','POTE','TOME','PETO']},
  {id:18, letters:['L','U','Z','E','S'], words:['LUZES','LUZE','USES','SUEZ']},
  {id:19, letters:['C','A','M','P','O'], words:['CAMPO','PACO','COMA','POMA','AMO']},
  {id:20, letters:['R','I','S','O','S'], words:['RISOS','RISO','SISO','SOS','RIO']},
];
const extra = ["BRASIL","FUTURO","AMIGO","FELIZ","CIDADE","NATUREZA","FAMILIA","ALEGRIA","VITORIA","ESTRELA","PLANETA","OCEANO","MONTANHA","JARDIM","AVENTURA","CULTURA","HISTORIA","MEMORIA","HARMONIA","CORAGEM","BONDADE","SABEDORIA","FELICIDADE","LIBERDADE","CARINHO","ESPERANCA","SAUDADE","CORACAO","PACIENCIA","SINCERO","CRIATIVO","ENERGIA","SONHAR","POSSIVEL","MUSICA","POESIA","UNIVERSO","GALAXIA","FLORESTA","VIAGEM","ESCOLA","TRABALHO","PESSOA","VIVER","AMAR","SORRIR","AJUDAR","UNIAO","PAZ","GENTIL","FORTE","HONESTO","LEAL","GRATO","OTIMISTA","BRILHO","CAMINHO","DESTINO","ALMA","VIDA","MUNDO","TERRA","AGUA","FOGO","SOL","LUA","MAR","RIO","VENTO","CHUVA","CAMPO","SERRA"];
for(let i=0;i<80;i++){
  const w = extra[i % extra.length];
  const letters = w.split('');
  const words = [w];
  if(w.length>=4) words.push(w.slice(0,4));
  if(w.length>=5) words.push(w.slice(-4));
  if(w.length>=6) words.push(w.slice(2,6));
  LEVELS.push({id:21+i, letters, words:[...new Set(words.map(x=>x.toUpperCase()))]});
}

let currentLevel=6;
let coins=728;
let foundWords={};
let wheelLetters=[];
let path=[];
let isDragging=false;
let currentWord='';
let lastRandom='';

const board=document.getElementById('board');
const coinCount=document.getElementById('coinCount');
const levelLabel=document.getElementById('levelLabel');
const currentWordEl=document.getElementById('currentWord');
const trace=document.getElementById('trace');
const wheelWrap=document.getElementById('wheelWrap');
const modal=document.getElementById('modal');

function save(){ localStorage.setItem('letrosoFinal', JSON.stringify({level:currentLevel,coins,found:foundWords})); }
function load(){ try{ const s=JSON.parse(localStorage.getItem('letrosoFinal')); if(s){ currentLevel=s.level||6; coins=s.coins??728; foundWords=s.found||{} } }catch{} }

function getLevel(id){
  if(id<=LEVELS.length) return JSON.parse(JSON.stringify(LEVELS[id-1]));
  return generateRandom(id);
}
function generateRandom(id){
  let w, letters, key;
  do {
    w = extra[Math.floor(Math.random()*extra.length)];
    letters = w.split('').sort(()=>Math.random()-0.5);
    key = letters.join('');
  } while(key===lastRandom || letters.length<5 || letters.length>7);
  lastRandom=key;
  return {id, letters, words:[w]};
}

function updateCoins(){ coinCount.textContent=coins; }

function renderBoard(level){
  board.innerHTML='';
  const maxLen=Math.max(...level.words.map(w=>w.length));
  level.words.forEach(word=>{
    const row=document.createElement('div'); row.className='word-row'; row.dataset.word=word;
    for(let i=0;i<word.length;i++){
      const s=document.createElement('div'); s.className='slot empty'; row.appendChild(s);
    }
    // center shorter words
    row.style.marginLeft = ((maxLen-word.length)*28)+'px';
    board.appendChild(row);
  });
  (foundWords[level.id]||[]).forEach(w=>revealWord(w,true));
}

function revealWord(word,silent){
  const row=[...board.querySelectorAll('.word-row')].find(r=>r.dataset.word===word);
  if(!row) return;
  [...row.children].forEach((s,i)=>{ s.textContent=word[i]; s.classList.remove('empty'); s.classList.add('filled'); });
  if(!silent){ row.classList.add('shake'); setTimeout(()=>row.classList.remove('shake'),400); }
}

function renderWheel(letters){
  const wheel=document.getElementById('wheel');
  wheel.querySelectorAll('.letter-btn').forEach(n=>n.remove());
  const size=324, cx=size/2, cy=size/2, r=112;
  letters.forEach((ltr,i)=>{
    const ang=(i/letters.length)*Math.PI*2 - Math.PI/2;
    const x=cx + r*Math.cos(ang);
    const y=cy + r*Math.sin(ang);
    const b=document.createElement('button');
    b.className='letter-btn'; b.textContent=ltr; b.style.left=x+'px'; b.style.top=y+'px'; b.dataset.i=i;
    wheel.appendChild(b);
  });
  attachWheel();
}

function attachWheel(){
  const btns=[...document.querySelectorAll('.letter-btn')];
  const start=(btn)=>{ isDragging=true; path=[btn]; btn.classList.add('active'); currentWord=btn.textContent; showCurrent(); updateTrace(); };
  btns.forEach(b=> b.addEventListener('pointerdown',e=>{e.preventDefault(); start(b);}));
  window.addEventListener('pointermove',e=>{
    if(!isDragging) return;
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(el && el.classList.contains('letter-btn') && !path.includes(el)){
      path.push(el); el.classList.add('active'); currentWord+=el.textContent; showCurrent(); updateTrace(); navigator.vibrate&&navigator.vibrate(8);
    }
  },{passive:true});
  const end=()=>{ if(!isDragging) return; isDragging=false; path.forEach(b=>b.classList.remove('active')); trace.innerHTML=''; hideCurrent(); if(currentWord.length>1) submitWord(currentWord); currentWord=''; path=[]; };
  window.addEventListener('pointerup',end); window.addEventListener('pointercancel',end);
}

function showCurrent(){ currentWordEl.textContent=currentWord; currentWordEl.style.opacity='1'; currentWordEl.style.transform='scale(1)'; }
function hideCurrent(){ currentWordEl.style.opacity='0'; currentWordEl.style.transform='scale(0.92)'; }

function updateTrace(){
  trace.innerHTML='';
  const wrap=wheelWrap.getBoundingClientRect();
  const pts=path.map(b=>{ const r=b.getBoundingClientRect(); return {x:r.left+r.width/2-wrap.left, y:r.top+r.height/2-wrap.top}; });
  if(pts.length>1){
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    poly.setAttribute('points',pts.map(p=>`${p.x},${p.y}`).join(' '));
    poly.setAttribute('fill','none'); poly.setAttribute('stroke','#FCD34D'); poly.setAttribute('stroke-width','10'); poly.setAttribute('stroke-linecap','round'); poly.setAttribute('stroke-linejoin','round');
    trace.appendChild(poly);
  }
  pts.forEach(p=>{ const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r','12'); c.setAttribute('fill','#FCD34D'); trace.appendChild(c); });
}

function submitWord(w){
  const level=getLevel(currentLevel);
  const up=w.toUpperCase();
  const found=foundWords[currentLevel]||[];
  if(level.words.includes(up) && !found.includes(up)){
    foundWords[currentLevel]=[...found,up];
    revealWord(up);
    coins+=up.length*4; updateCoins(); save(); checkWin(); navigator.vibrate&&navigator.vibrate(15);
  }else{
    document.getElementById('wheel').classList.add('shake'); setTimeout(()=>document.getElementById('wheel').classList.remove('shake'),400); navigator.vibrate&&navigator.vibrate([10,20,10]);
  }
}

function checkWin(){
  const level=getLevel(currentLevel);
  const found=foundWords[currentLevel]||[];
  if(found.length>=level.words.length){
    setTimeout(()=>{ coins+=30; updateCoins(); save(); modal.classList.remove('hidden'); modal.classList.add('flex'); },550);
  }
}

function loadLevel(id){
  currentLevel=id;
  const level=getLevel(id);
  levelLabel.textContent=`Nível ${id}`;
  renderBoard(level);
  wheelLetters=[...level.letters];
  renderWheel(wheelLetters);
  updateCoins(); save();
}

function shuffle(){
  wheelLetters.sort(()=>Math.random()-0.5);
  renderWheel(wheelLetters);
  navigator.vibrate&&navigator.vibrate(10);
}
document.getElementById('shuffle').onclick=shuffle;
document.getElementById('extraShuffle').onclick=shuffle;

document.getElementById('hintBtn').onclick=()=>{
  if(coins<20){ coinCount.parentElement.classList.add('shake'); setTimeout(()=>coinCount.parentElement.classList.remove('shake'),400); return; }
  const level=getLevel(currentLevel);
  const found=foundWords[currentLevel]||[];
  const unfound=level.words.filter(w=>!found.includes(w));
  if(!unfound.length) return;
  coins-=20; updateCoins();
  const pick=unfound[0];
  foundWords[currentLevel]=[...found,pick];
  revealWord(pick); save(); checkWin();
};

document.getElementById('nextBtn').onclick=()=>{
  modal.classList.add('hidden'); modal.classList.remove('flex');
  loadLevel(currentLevel+1);
};

load(); loadLevel(currentLevel);
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>

</body></html>
