        <polyline id="poly" fill="none" stroke="#6a1b9a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" points=""></polyline>
      </svg>
      <div id="wheel" class="absolute inset-0 z-10"><button class="wheel-letter absolute w-[74px] h-[74px] -ml-[37px] -mt-[37px] bg-white rounded-full flex items-center justify-center text-[34px] font-black text-[#4527a0] shadow-[0_7px_0_#e8e0f7,0_12px_24px_rgba(13,71,161,0.25)]" data-char="O" data-x="150" data-y="46" style="left: 150px; top: 46px;">O</button><button class="wheel-letter absolute w-[74px] h-[74px] -ml-[37px] -mt-[37px] bg-white rounded-full flex items-center justify-center text-[34px] font-black text-[#4527a0] shadow-[0_7px_0_#e8e0f7,0_12px_24px_rgba(13,71,161,0.25)]" data-char="P" data-x="254" data-y="150" style="left: 254px; top: 150px;">P</button><button class="wheel-letter absolute w-[74px] h-[74px] -ml-[37px] -mt-[37px] bg-white rounded-full flex items-center justify-center text-[34px] font-black text-[#4527a0] shadow-[0_7px_0_#e8e0f7,0_12px_24px_rgba(13,71,161,0.25)]" data-char="T" data-x="218" data-y="244" style="left: 218px; top: 244px;">T</button><button class="wheel-letter absolute w-[74px] h-[74px] -ml-[37px] -mt-[37px] bg-white rounded-full flex items-center justify-center text-[34px] font-black text-[#4527a0] shadow-[0_7px_0_#e8e0f7,0_12px_24px_rgba(13,71,161,0.25)]" data-char="R" data-x="82" data-y="244" style="left: 82px; top: 244px;">R</button><button class="wheel-letter absolute w-[74px] h-[74px] -ml-[37px] -mt-[37px] bg-white rounded-full flex items-center justify-center text-[34px] font-black text-[#4527a0] shadow-[0_7px_0_#e8e0f7,0_12px_24px_rgba(13,71,161,0.25)]" data-char="A" data-x="46" data-y="150" style="left: 46px; top: 150px;">A</button></div>
      <div id="currentWord" class="absolute -top-[52px] left-1/2 -translate-x-1/2 bg-[#0d47a1]/80 text-white px-6 py-2.5 rounded-full font-black text-[22px] tracking-[0.18em] min-w-[90px] text-center backdrop-blur-md border border-white/20 shadow-lg opacity-0 transition-opacity" style="opacity: 0;"></div>
    </div>
  </div>
</div>

<!-- WIN MODAL -->
<div id="winModal" class="fixed inset-0 bg-[#0d47a1]/70 backdrop-blur-md items-center justify-center z-50 p-6 hidden">
  <div class="bg-white rounded-[32px] p-8 w-full max-w-[340px] text-center shadow-[0_20px_60px_rgba(0,0,0,0.35)]">
    <div class="text-[64px] leading-none mb-3">🏆</div>
    <h2 class="text-[26px] font-black text-[#0d47a1] mb-1">Nível Completo!</h2>
    <p class="text-gray-600 font-bold mb-6">+50 moedas</p>
    <button id="nextBtn" class="w-full bg-gradient-to-b from-[#1e90ff] to-[#1565c0] text-white font-black text-[18px] py-4 rounded-2xl shadow-[0_8px_0_#0d47a1] active:translate-y-1 active:shadow-[0_4px_0_#0d47a1] transition-all">PRÓXIMO</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const progressive = [
  { words:["PATO","RATO","TOPA"] },
  { words:["PATO","RATO","TOPA","APTO"] },
  { words:["PATO","RATO","TOPA","APTO","ATOR"] },
  { words:["PATO","RATO","TOPA","APTO","ATOR","PROA"] },
  { words:["PATO","RATO","TOPA","APTO","ATOR","PROA","TROPA"] },
  { words:["PARTO","PORTA","PRATO","TROPA","PATO","RATO","TOPA"] } // NÍVEL 6 EXATO
];

let state = JSON.parse(localStorage.getItem('palavras-pt') || '{}');
let level = state.level || 1;
let coins = state.coins ?? 728;
let hints = state.hints ?? 20;

let currentPuzzle, foundWords = new Set();
let isDragging = false, selected = [];

function getPuzzle(lvl){
  if(lvl>=1 && lvl<=6){
    const base = [
      {char:'O', x:150, y:46},
      {char:'P', x:254, y:150},
      {char:'T', x:218, y:244},
      {char:'R', x:82, y:244},
      {char:'A', x:46, y:150}
    ];
    return { letters: base, words: progressive[lvl-1].words, fixed:true };
  }
  const pools = [
    {letters:['M','A','R','E','S'], words:["MARES","MESA","ARME","AMES","REMA","SER","MAR","MAS","ERA"]},
    {letters:['C','A','N','T','O'], words:["CANTO","CONTA","NOTA","TOCA","COTA","NATO","TACO","CANO"]},
    {letters:['P','O','R','T','A'], words:["PARTO","PORTA","PRATO","TROPA","PATO","RATO","TOPA","APTO","ATOR","PROA"]}
  ];
  const pick = pools[(lvl-7) % pools.length];
  const letters = pick.letters.map((ch,i)=>{
    const a = -Math.PI/2 + i*2*Math.PI/pick.letters.length;
    return {char:ch, x:150+Math.cos(a)*108, y:150+Math.sin(a)*108};
  });
  return {letters, words:pick.words, fixed:false};
}

function save(){ localStorage.setItem('palavras-pt', JSON.stringify({level,coins,hints})); }
function updateUI(){ $('coins').textContent=coins; $('hints').textContent=hints; $('levelNum').textContent=level; }

function renderGrid(){
  const grid = $('grid');
  grid.innerHTML='';
  currentPuzzle.words.forEach(w=>{
    const row = document.createElement('div');
    row.className='flex gap-[8px] justify-center';
    row.dataset.word=w;
    [...w].forEach(ch=>{
      const tile = document.createElement('div');
      const done = foundWords.has(w);
      tile.className = (done?'tile':'tile-empty')+' w-[48px] h-[52px] sm:w-[54px] sm:h-[56px] rounded-[14px] flex items-center justify-center text-white font-black text-[24px] sm:text-[26px]';
      tile.textContent = done?ch:'';
      if(done) tile.classList.add('pop');
      row.appendChild(tile);
    });
    grid.appendChild(row);
  });
}

function renderWheel(letters){
  const wheel=$('wheel'); wheel.innerHTML='';
  letters.forEach(l=>{
    const b=document.createElement('button');
    b.className='wheel-letter absolute w-[74px] h-[74px] -ml-[37px] -mt-[37px] bg-white rounded-full flex items-center justify-center text-[34px] font-black text-[#4527a0] shadow-[0_7px_0_#e8e0f7,0_12px_24px_rgba(13,71,161,0.25)]';
    b.style.left=l.x+'px'; b.style.top=l.y+'px';
    b.textContent=l.char; b.dataset.char=l.char;
    b.dataset.x=l.x; b.dataset.y=l.y;
    wheel.appendChild(b);
  });
}

function showWord(){
  const w=selected.map(s=>s.dataset.char).join('');
  const el=$('currentWord');
  el.textContent=w; el.style.opacity=w?'1':'0';
}

function updateTrace(e){
  const pts=selected.map(s=>[+s.dataset.x,+s.dataset.y]);
  if(e && isDragging){
    const r=$('wheelWrap').getBoundingClientRect();
    pts.push([e.clientX-r.left, e.clientY-r.top]);
  }
  $('poly').setAttribute('points', pts.map(p=>p.join(',')).join(' '));
}

function clearSel(){
  selected.forEach(s=>s.classList.remove('active'));
  selected=[]; $('poly').setAttribute('points',''); showWord();
}

function startSel(el){
  if(selected.includes(el)) return;
  selected.push(el); el.classList.add('active'); showWord(); updateTrace();
}

function endSel(){
  isDragging=false;
  const word=selected.map(s=>s.dataset.char).join('');
  clearSel();
  if(word.length<3) return;
  if(currentPuzzle.words.includes(word) && !foundWords.has(word)){
    foundWords.add(word); coins+=10; updateUI(); renderGrid();
    if(navigator.vibrate) navigator.vibrate(15);
    if(foundWords.size===currentPuzzle.words.length){
      setTimeout(()=>{ coins+=50; hints+=2; updateUI(); save(); $('winModal').classList.remove('hidden'); $('winModal').classList.add('flex'); }, 450);
    }
    save();
  }else if(!currentPuzzle.words.includes(word)){
    $('wheelWrap').classList.add('shake'); setTimeout(()=>$('wheelWrap').classList.remove('shake'),350);
  }
}

function loadLevel(){
  currentPuzzle=getPuzzle(level);
  foundWords=new Set();
  updateUI(); renderGrid(); renderWheel(currentPuzzle.letters); save();
}

$('wheel').addEventListener('pointerdown',e=>{
  const t=e.target.closest('.wheel-letter'); if(!t) return;
  e.preventDefault(); isDragging=true; startSel(t);
});
window.addEventListener('pointermove',e=>{
  if(!isDragging) return;
  const el=document.elementFromPoint(e.clientX,e.clientY)?.closest('.wheel-letter');
  if(el && !selected.includes(el) && $('wheel').contains(el)) startSel(el);
  updateTrace(e);
});
window.addEventListener('pointerup',()=>{ if(isDragging) endSel(); });

$('shuffleBtn').onclick=()=>{
  const l=[...currentPuzzle.letters];
  for(let i=l.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [l[i],l[j]]=[l[j],l[i]]; }
  if(currentPuzzle.fixed){
    const pos=[{x:150,y:46},{x:254,y:150},{x:218,y:244},{x:82,y:244},{x:46,y:150}];
    currentPuzzle.letters=l.map((c,i)=>({char:c.char,x:pos[i].x,y:pos[i].y}));
  }else{
    currentPuzzle.letters=l.map((c,i)=>{ const a=-Math.PI/2+i*2*Math.PI/l.length; return {char:c.char,x:150+Math.cos(a)*108,y:150+Math.sin(a)*108}; });
  }
  renderWheel(currentPuzzle.letters);
};
$('clearBtn').onclick=()=>{ clearSel(); };
$('hintBtn').onclick=()=>{
  if(hints<=0) return;
  const uns=currentPuzzle.words.filter(w=>!foundWords.has(w)); if(!uns.length) return;
  hints--; foundWords.add(uns[0]); renderGrid(); updateUI(); save();
  if(foundWords.size===currentPuzzle.words.length){ setTimeout(()=>{$('winModal').classList.remove('hidden');$('winModal').classList.add('flex'); coins+=50;hints+=2;updateUI();save();},400); }
};
$('nextBtn').onclick=()=>{ $('winModal').classList.add('hidden'); $('winModal').classList.remove('flex'); level++; if(level>100 && level<1000) level=101; loadLevel(); };

document.addEventListener('contextmenu',e=>e.preventDefault());
loadLevel();
updateUI();

// Prevent pull to refresh
let lastY=0;
window.addEventListener('touchstart',e=>{lastY=e.touches[0].clientY},{passive:false});
window.addEventListener('touchmove',e=>{ const y=e.touches[0].clientY; if(Math.abs(y-lastY)>5) e.preventDefault(); },{passive:false});
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>

</body></html>
