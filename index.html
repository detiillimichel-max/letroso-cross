<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Letroso Cross</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:linear-gradient(#1a0033,#660099);min-height:100vh;color:white;display:flex;flex-direction:column}
header{padding:12px;display:flex;justify-content:space-between;background:rgba(0,0,0,.2)}
.level-info{font-weight:800}
.coins{background:rgba(255,215,0,.2);padding:6px 14px;border-radius:20px}
main{flex:1;padding:16px;max-width:500px;margin:0 auto;width:100%}
.question{background:linear-gradient(135deg,#ff00aa,#aa00ff);padding:16px;border-radius:20px;text-align:center;font-weight:900;font-size:20px;margin-bottom:20px}
.slots{display:grid;gap:8px;margin-bottom:24px;justify-content:center}
.slot-row{display:flex;gap:6px;justify-content:center}
.letter-slot{width:42px;height:42px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px}
.letter-slot.filled{background:linear-gradient(135deg,#ff00aa,#ff66cc);border-color:#fff}
.wheel-container{position:relative;width:280px;height:280px;margin:0 auto 20px}
.wheel-bg{position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.1),transparent);border-radius:50%;border:1px solid rgba(255,255,255,.2)}
.letter-btn{position:absolute;width:64px;height:64px;border-radius:50%;background:#fff;color:#660099;font-weight:900;font-size:26px;border:none;box-shadow:0 4px 0 #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center}
.letter-btn.active{background:#ff00aa;color:white;transform:scale(.92)}
.current-word{height:50px;display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:16px}
.current-letter{width:36px;height:36px;background:white;color:#660099;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900}
.controls{display:flex;gap:10px;justify-content:center}
.btn{padding:12px 24px;border:none;border-radius:14px;font-weight:800;cursor:pointer}
.btn-hint{background:#ffaa00;color:white}
.btn-shuffle{background:#00aaff;color:white}
.found-words{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px}
.found-word{background:rgba(0,255,136,.2);padding:4px 10px;border-radius:12px;font-size:13px}
.level-complete{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100}
.level-complete.hidden{display:none}
.complete-box{background:linear-gradient(135deg,#ff00aa,#aa00ff);padding:32px;border-radius:28px;text-align:center;max-width:320px;width:90%}
</style>
</head>
<body>
<header>
  <div class="level-info">Nível <span id="levelNum">1</span></div>
  <div class="coins">🪙 <span id="coinCount">50</span></div>
</header>
<main>
  <div class="question">Você consegue resolver todos eles?</div>
  <div class="slots" id="slots"></div>
  <div class="current-word" id="currentWord"></div>
  <div class="wheel-container">
    <div class="wheel-bg"></div>
    <div id="wheel"></div>
  </div>
  <div class="controls">
    <button class="btn btn-hint" id="hintBtn">💡 Dica (20)</button>
    <button class="btn btn-shuffle" id="shuffleBtn">🔀 Embaralhar</button>
  </div>
  <div class="found-words" id="foundWords"></div>
</main>
<div class="level-complete hidden" id="levelComplete">
  <div class="complete-box">
    <h2>🎉 Perfeito!</h2>
    <p id="completeText">Nível completo!</p>
    <p>+<span id="bonusCoins">30</span> moedas</p>
    <button id="nextBtn" style="width:100%;padding:16px;background:white;color:#aa00ff;font-weight:900;font-size:18px;border:none;border-radius:14px;margin-top:10px">PRÓXIMO</button>
  </div>
</div>

<script>
const levels = [
  {l:"SOL",w:["SOL","LOS","OS"]},
  {l:"LOBO",w:["LOBO","BOLO","SOLO","BOLA","SOL","LOB"]},
  {l:"CASA",w:["CASA","ASA","SACA","CAS"]},
  {l:"AMOR",w:["AMOR","RAMO","ROMA","MAR","AMO"]},
  {l:"FESTA",w:["FESTA","SETA","TESTA","FATE","ESTA"]},
  {l:"TRILHA",w:["TRILHA","LIRA","RITA","TIRA","ATIRA","LATA"]},
  {l:"LIVRO",w:["LIVRO","VIRO","RIO","VIR"]},
  {l:"PONTO",w:["PONTO","TONO","NOTA","PATO","TOP"]},
  {l:"MAGIA",w:["MAGIA","AMIGA","GAMA","MIA"]},
  {l:"SONHO",w:["SONHO","SONO","NOS"]},
  {l:"VENTO",w:["VENTO","NOVO","VETO","NETO"]},
  {l:"PRAIA",w:["PRAIA","PARA","PIRA","PAI"]},
  {l:"FLORES",w:["FLORES","SOL","ROSE"]},
  {l:"MUNDO",w:["MUNDO","MUDO","NOME","DOM"]},
  {l:"TEMPO",w:["TEMPO","POTE","MOTE","TOME"]},
  {l:"LUZES",w:["LUZES","LUZ","USE"]},
  {l:"CAMPO",w:["CAMPO","POMAR","AMOR","COMA"]},
  {l:"RISOS",w:["RISOS","RISO","RIOS"]},
  {l:"PORTA",w:["PORTA","PRATO","TROPA","RATO"]},
  {l:"ESTRELA",w:["ESTRELA","LESTE","TELA","LATE"]},
];

let level = parseInt(localStorage.getItem('lv')||'1');
let coins = parseInt(localStorage.getItem('cn')||'50');
let found = [];
let letters = [];
let path = [];

function save(){localStorage.setItem('lv',level);localStorage.setItem('cn',coins);}
<script>
function getLevel(){
  if(level<=20) return levels[level-1];
  // NÍVEL 21+ INFINITO - letras em posições diferentes
  const bases = ["BRASIL","FUTURO","AMIGO","FELIZ","CIDADE","NATUREZA","AVENTURA"];
  const base = bases[(level-21)%bases.length];
  return {l:base, w:[base.substring(0,3),base.substring(0,4),base]};
}

function init(){
  const data = getLevel();
  // EMBARALHA POSIÇÕES (sua pergunta!)
  letters = data.l.split('').sort(()=>Math.random()-0.5);
  
  document.getElementById('levelNum').textContent = level;
  document.getElementById('coinCount').textContent = coins;
  found = [];
  document.getElementById('foundWords').innerHTML = '';
  document.getElementById('currentWord').innerHTML = '';
  
  // Slots
  const slots = document.getElementById('slots');
  slots.innerHTML = '';
  const row = document.createElement('div');
  row.className='slot-row';
  data.w.forEach(word=>{
    for(let i=0;i<word.length;i++){
      const s = document.createElement('div');
      s.className='letter-slot';
      s.dataset.w=word;
      s.dataset.p=i;
      row.appendChild(s);
    }
    row.appendChild(Object.assign(document.createElement('div'),{style:'width:12px'}));
  });
  slots.appendChild(row);
  
  // Roda
  const wheel = document.getElementById('wheel');
  wheel.innerHTML = '';
  const step = 2*Math.PI/letters.length;
  letters.forEach((lt,i)=>{
    const b = document.createElement('button');
    b.className='letter-btn';
    b.textContent = lt;
    b.dataset.i=i;
    const a = i*step - Math.PI/2;
    b.style.left = 140 + 95*Math.cos(a) - 32 + 'px';
    b.style.top = 140 + 95*Math.sin(a) - 32 + 'px';
    wheel.appendChild(b);
  });
  setupDrag();
  save();
}

let dragging = false;
function setupDrag(){
  const wheel = document.getElementById('wheel');
  wheel.onpointerdown = e=>{
    dragging = true;
    path = [];
    const b = e.target.closest('.letter-btn');
    if(b) addPath(b);
  };
  window.onpointermove = e=>{
    if(!dragging) return;
    const el = document.elementFromPoint(e.clientX,e.clientY);
    const b = el?.closest('.letter-btn');
    if(b && !path.includes(b)) addPath(b);
  };
  window.onpointerup = ()=>{
    if(!dragging) return;
    dragging = false;
    check();
    path.forEach(b=>b.classList.remove('active'));
    path=[];
    document.getElementById('currentWord').innerHTML='';
  };
}

function addPath(b){
  path.push(b);
  b.classList.add('active');
  const cw = document.getElementById('currentWord');
  cw.innerHTML = path.map(x=>`<div class="current-letter">${x.textContent}</div>`).join('');
  }
  <script>
function check(){
  const word = path.map(b=>b.textContent).join('').toUpperCase();
  const data = getLevel();
  if(data.w.includes(word) &&!found.includes(word)){
    found.push(word);
    document.querySelectorAll(`[data-w="${word}"]`).forEach((s,i)=>{
      s.textContent = word[i];
      s.classList.add('filled');
    });
    const tag = document.createElement('div');
    tag.className='found-word';
    tag.textContent = word;
    document.getElementById('foundWords').appendChild(tag);
    coins += 5;
    document.getElementById('coinCount').textContent = coins;
    if(navigator.vibrate) navigator.vibrate(20);
    if(found.length >= data.w.length){
      setTimeout(()=>{
        coins += 20;
        document.getElementById('bonusCoins').textContent = 20;
        document.getElementById('completeText').textContent = `Nível ${level} completo!`;
        document.getElementById('levelComplete').classList.remove('hidden');
        save();
      },500);
    }
  }
}

document.getElementById('nextBtn').onclick = ()=>{
  level++;
  document.getElementById('levelComplete').classList.add('hidden');
  init();
};

document.getElementById('hintBtn').onclick = ()=>{
  if(coins<20) return alert('Sem moedas!');
  const data = getLevel();
  const rem = data.w.find(w=>!found.includes(w));
  if(rem){
    coins -= 20;
    document.getElementById('coinCount').textContent = coins;
    const s = document.querySelector(`[data-w="${rem}"][data-p="0"]`);
    if(s){s.textContent=rem[0];s.classList.add('filled');}
    save();
  }
};

document.getElementById('shuffleBtn').onclick = ()=>{
  // REEMBARALHA - muda posições das letras
  letters.sort(()=>Math.random()-0.5);
  init();
};

init();
</script>
</body>
</html>
